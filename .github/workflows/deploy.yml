name: Build and Deploy Scraper

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lead-express-scraper

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    environment: Production
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24.6"
          check-latest: true

      - name: Go Vet
        run: go vet ./...

      - name: Go Build Check
        run: go build -o /dev/null ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/tpgainz/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    name: Deploy to Production
    environment: Production
    timeout-minutes: 15
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 900s
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            NEW_IMAGE="ghcr.io/tpgainz/lead-express-scraper:latest"
            BACKUP_TAG="backup-$(date +%Y%m%d-%H%M%S)"

            echo "Starting scraper deployment..."
            cd "$DEPLOY_PATH"

            # Backup current image
            if docker compose ps scraper | grep -q "Up"; then
              CURRENT_IMAGE=$(docker inspect $(docker compose ps -q scraper) --format='{{.Config.Image}}' 2>/dev/null || echo "none")
              if [ "$CURRENT_IMAGE" != "none" ] && [ "$CURRENT_IMAGE" != "$NEW_IMAGE" ]; then
                docker tag "$CURRENT_IMAGE" "ghcr.io/tpgainz/lead-express-scraper:$BACKUP_TAG"
                echo "Backup created: $BACKUP_TAG"
              fi
            fi

            # Pull new image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            if ! docker pull "$NEW_IMAGE"; then
              echo "Failed to pull new image"
              exit 1
            fi

            # Update docker-compose from repo
            curl -fsSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 -o docker-compose.yaml.new \
                 "https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.yaml?ref=main"

            if docker compose -f docker-compose.yaml.new config >/dev/null 2>&1; then
              mv docker-compose.yaml.new docker-compose.yaml
              echo "docker-compose.yaml updated"
            else
              echo "Invalid docker-compose file, keeping current"
              rm -f docker-compose.yaml.new
            fi

            # Deploy
            export SCRAPER_IMAGE="$NEW_IMAGE"
            if ! docker compose up -d --no-deps scraper; then
              echo "Failed to start new container"
              BACKUP_IMAGES=$(docker images "ghcr.io/tpgainz/lead-express-scraper" --format "{{.Tag}}" | grep "backup-" | head -1)
              if [ -n "$BACKUP_IMAGES" ]; then
                export SCRAPER_IMAGE="ghcr.io/tpgainz/lead-express-scraper:$BACKUP_IMAGES"
                docker compose up -d --no-deps scraper
                echo "Rolled back to $BACKUP_IMAGES"
              fi
              exit 1
            fi

            sleep 10

            # Health check: verify container is running and not restart-looping
            echo "Checking container health..."
            HEALTHY=false
            for i in 1 2 3 4 5 6; do
              echo "Check attempt $i/6..."
              STATUS=$(docker compose ps scraper --format '{{.State}}' 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "running" ]; then
                # Verify it's not restart-looping by checking restart count
                RESTARTS=$(docker inspect $(docker compose ps -q scraper) --format='{{.RestartCount}}' 2>/dev/null || echo "99")
                if [ "$RESTARTS" -lt 3 ]; then
                  HEALTHY=true
                  break
                fi
              fi
              [ $i -lt 6 ] && sleep 10
            done

            if [ "$HEALTHY" = false ]; then
              echo "Container health check failed"
              docker compose logs scraper --tail=50
              BACKUP_IMAGES=$(docker images "ghcr.io/tpgainz/lead-express-scraper" --format "{{.Tag}}" | grep "backup-" | head -1)
              if [ -n "$BACKUP_IMAGES" ]; then
                export SCRAPER_IMAGE="ghcr.io/tpgainz/lead-express-scraper:$BACKUP_IMAGES"
                docker compose up -d --no-deps scraper
                echo "Rolled back to $BACKUP_IMAGES"
              fi
              exit 1
            fi

            echo "Container is healthy"

            # Cleanup
            docker container prune -f --filter "until=1h"
            docker image prune -f --filter "until=24h"
            docker images "ghcr.io/tpgainz/lead-express-scraper" --format "{{.Tag}}" | \
              grep "backup-" | sort -r | tail -n +4 | \
              xargs -r -I {} docker rmi "ghcr.io/tpgainz/lead-express-scraper:{}" 2>/dev/null || true

            echo "Scraper deployment completed!"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy]
    environment: Production
    if: always()
    name: Notify Deployment Status
    steps:
      - name: Get commit info
        id: commit
        run: |
          echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "author=${GITHUB_ACTOR}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          MESSAGE="Scraper deployed successfully!\n\nCommit: \`${{ steps.commit.outputs.sha }}\`\nAuthor: ${{ steps.commit.outputs.author }}\nBranch: ${{ steps.commit.outputs.branch }}"
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"content\":\"$MESSAGE\"}" \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
          fi

      - name: Notify failure
        if: needs.deploy.result != 'success'
        run: |
          MESSAGE="Scraper deployment failed!\n\nCommit: \`${{ steps.commit.outputs.sha }}\`\nAuthor: ${{ steps.commit.outputs.author }}\nDetails: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"content\":\"$MESSAGE\"}" \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
          fi
